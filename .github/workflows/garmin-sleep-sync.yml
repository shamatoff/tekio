name: Garmin sleep sync

# Pulls Garmin Connect sleep (duration + Sleep Score + HRV) into Supabase sleep_logs.
# See scripts/garmin-sync/README.md for the one-time secret setup.

on:
  schedule:
    # 09:00 UTC daily (~10–11 Europe local) — the overnight watch sync has landed by then.
    - cron: '0 9 * * *'
  workflow_dispatch: # manual "Run workflow" button for testing / backfill

concurrency:
  group: garmin-sleep-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/garmin-sync/requirements.txt

      - run: pip install -r scripts/garmin-sync/requirements.txt

      - run: python scripts/garmin-sync/sync_sleep.py
        env:
          GARMIN_TOKENSTORE: ${{ secrets.GARMIN_TOKENSTORE }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEKIO_USER_ID: ${{ secrets.TEKIO_USER_ID }}
          SYNC_DAYS: '3'
